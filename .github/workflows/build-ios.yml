name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install
        working-directory: .

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS (unsigned – for AltStore sideload)
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath DerivedData \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM=""

      - name: Package as IPA
        working-directory: ios/App
        run: |
          APP=$(find DerivedData/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -1)
          echo "App found: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r TrackerGodzin.ipa Payload/
          ls -lh TrackerGodzin.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrackerGodzin-iOS
          path: ios/App/TrackerGodzin.ipa
          retention-days: 30
